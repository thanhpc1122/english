<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flashcard Offline</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <meta name="display" content="standalone">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>

<body>
    <div id="db-screen" class="screen active">
        <h1>📦 Nạp Dữ Liệu</h1>
        <div class="card setup-card">
            <p style="text-align: center; color: #94a3b8;">Hãy chọn file <b>english_system.db</b> từ điện thoại / máy
                tính của bạn để bắt đầu.</p>
            <input type="file" id="db-upload" accept=".db,.sqlite,.sqlite3"
                style="padding: 10px; background: #334155; color: white;">
            <p id="db-status" style="text-align: center; color: #fbbf24; font-weight: bold;"></p>
        </div>
    </div>

    <div id="setup-screen" class="screen">
        <div class="header">
            <h1>🚀 Cấu Hình</h1>
            <button id="btn-fullscreen" class="btn-ghost">⛶ Toàn màn hình</button>
        </div>
        <div class="card setup-card">
            <label>1. Chọn Day:</label>
            <select id="day-select"></select>

            <label>2. Phạm vi từ (A - B):</label>
            <div class="range-inputs">
                <input type="number" id="start-index" min="1" max="100" placeholder="Từ">
                <span> - </span>
                <input type="number" id="end-index" min="1" max="100" placeholder="Đến">
            </div>

            <label>3. Chế độ:</label>
            <select id="mode-select">
                <option value="flashcard">🎴 Học Flashcard</option>
                <option value="quiz_en_vi">📝 KT: Anh ➔ Việt</option>
                <option value="quiz_vi_en">📝 KT: Việt ➔ Anh</option>
            </select>
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #f8fafc;">
                <input type="checkbox" id="shuffle-checkbox" style="width: 20px; height: 20px;">
                🔀 Đảo trộn từ vựng ngẫu nhiên
            </label>
            <button id="btn-start" class="btn-primary">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="flashcard-screen" class="screen">
        <div class="header">
            <button id="btn-back" class="btn-ghost">⬅ Cài đặt</button>
            <span id="progress-text">0/0</span>
        </div>

        <div class="flashcard-container">
            <div id="flashcard" class="flashcard">
                <div class="card-face front">
                    <div id="card-id" class="badge">Day #</div>
                    <h2 id="card-word">Word</h2>
                    <p id="card-pos" class="pos-text">(pos)</p>
                    <p id="card-ipa" class="ipa-text" style="color: #94a3b8; font-size: 16px; margin-top: 5px;">/ipa/
                    </p>
                    <button id="btn-speak" class="btn-icon">🔊</button>
                    <p class="hint-text">Chạm để lật thẻ</p>
                </div>
                <div class="card-face back">
                    <h3 id="card-meaning">Ý nghĩa</h3>
                    <div id="card-examples" class="examples-box"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-prev" class="btn-nav">◀ Trước</button>
            <button id="btn-next" class="btn-nav">Tiếp ▶</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="header">
            <button id="btn-quiz-back" class="btn-ghost">⬅ Cài đặt</button>
            <span id="quiz-progress-text">0/0</span>
        </div>

        <div class="flashcard-container">
            <div class="card quiz-card">
                <div id="quiz-id" class="badge">Day #</div>
                <h2 id="quiz-question" style="margin-top: 30px;">Question</h2>
                <div id="quiz-options" class="options-grid">
                </div>
            </div>
        </div>

        <div class="controls" style="justify-content: center;">
            <button id="btn-quiz-next" class="btn-primary" style="width: 100%; display: none;">Tiếp tục ▶</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
